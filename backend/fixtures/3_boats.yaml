App\Entity\Boat:
    boat_{1..5}:
        name: '<randomElement(["Le Voyageur", "Neptune", "L''Étoile du Sud", "Mistral", "La Belle Vague", "Horizon", "Poséidon", "Zéphyr", "La Méditerranée", "Cap Azur"])> <current()>'
        type: '<randomElement(["Voilier", "Catamaran", "Yacht", "Bateau à moteur", "Vedette"])>'
        status: 'DISPONIBLE'
        owner: '@user_owner_<randomElement([1, 2, 3, 4, 5])>'
        port: '@port_<randomElement([marseille, nice, toulon, cannes, sete])>'
        createdAt: '<dateTimeBetween("-2 months", "-1 month")>'

    boat_{6..10}:
        name: '<randomElement(["Le Corsaire", "Tempête", "Blue Dream", "La Sirène", "Aventure", "Liberté", "Ocean Star", "Tramontane", "Cap Nord", "La Goélette"])> <current()>'
        type: '<randomElement(["Voilier", "Catamaran", "Yacht", "Bateau à moteur", "Vedette"])>'
        status: 'LOUÉ'
        owner: '@user_owner_<randomElement([1, 2, 3, 4, 5])>'
        port: '@port_<randomElement([brest, bordeaux, lorient])>'
        createdAt: '<dateTimeBetween("-3 months", "-2 months")>'

    boat_{11..15}:
        name: '<randomElement(["Vieux Loup", "Alizé", "La Caravelle", "Marin d''Eau Douce", "Typhon", "Swell", "Pacific", "Aquila", "Mercure", "Atlas"])> <current()>'
        type: '<randomElement(["Voilier", "Catamaran", "Yacht", "Bateau à moteur", "Vedette"])>'
        status: 'EN_RÉPARATION'
        owner: '@user_owner_<randomElement([1, 2, 3, 4, 5])>'
        port: null
        createdAt: '<dateTimeBetween("-4 months", "-3 months")>'
